<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>퀴즈 만들기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='.5' stop-color='%238b5cf6'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><circle cx='32' cy='25' r='9' fill='white'/><path d='M32 31 L43 48 L21 48 Z' fill='white'/></svg>">
<script>(function(){try{var t=localStorage.getItem('cq_theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root { color-scheme: light;
    --bg:#fafafa; --surface:#ffffff; --bd:#e4e4e7; --mut:#71717a; --fg:#18181b;
    --acc:#2563eb; --acc-soft:#eff6ff; --on-acc:#ffffff; --hover:#f4f4f5;
    --brand: linear-gradient(135deg,#6366f1,#8b5cf6 50%,#06b6d4);
    --shadow: 0 1px 3px rgba(24,24,27,.08), 0 1px 2px rgba(24,24,27,.04); }
  :root[data-theme="dark"] { color-scheme: dark;
    --bg:#0f172a; --surface:#1e293b; --bd:#334155; --mut:#94a3b8; --fg:#e2e8f0;
    --acc:#38bdf8; --acc-soft:#0c2a40; --on-acc:#06283d; --hover:#334155;
    --shadow: 0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.3); }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, "Noto Sans KR", sans-serif;
         background: var(--bg); color: var(--fg); display: flex; height: 100vh; }
  /* Image_Editor 처럼 빈 공간(편집기 영역)에 teaveloper 엠블럼 배경 워터마크.
     사이드바는 불투명(surface)이라 가려지고, 투명한 편집기 영역에만 비친다. */
  body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: var(--brand);
    -webkit-mask: url(/emblem.png) center / auto 56vh no-repeat;
            mask: url(/emblem.png) center / auto 56vh no-repeat;
    opacity: .06; }
  :root[data-theme="dark"] body::before { opacity: .10; }

  /* 사이드바 */
  aside { width: 260px; background: var(--surface); border-right: 1px solid var(--bd);
          display: flex; flex-direction: column; flex-shrink: 0; }
  aside header { padding: 16px; font-weight: 800; font-size: 16px;
                 display: flex; align-items: center; gap: 8px; }
  aside header .logolink { display: inline-flex; flex-shrink: 0; }
  aside header .logo { width: 30px; height: 30px; padding: 4px 8px; border-radius: 7px;
                       background: var(--brand); object-fit: contain; }
  aside header .ttl { background: var(--brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  aside header a { margin-left: auto; font-size: 13px; color: var(--acc); text-decoration: none; font-weight: 600; }
  .themebtn { display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--bd);
              background: var(--surface); color: var(--fg); border-radius: 8px; padding: 6px; cursor: pointer; }
  .themebtn:hover { background: var(--hover); }
  .ico { width: 15px; height: 15px; flex-shrink: 0; }
  .importbtn, .imgadd, .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
  .newbtn { margin: 0 16px 8px; padding: 10px; border: none; border-radius: 10px;
            background: var(--brand); color: #fff; font-weight: 700; cursor: pointer; }
  .importbtn { margin: 0 16px 12px; padding: 9px; border: 1px solid var(--bd); border-radius: 10px;
               background: var(--surface); color: var(--fg); font-weight: 700; cursor: pointer; }
  .importbtn:hover { background: var(--hover); }
  .qlist { overflow-y: auto; flex: 1; padding: 0 8px 16px; }
  .qitem { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 6px; }
  .qitem:hover { background: var(--hover); }
  .qitem.active { background: var(--acc-soft); color: var(--acc); }
  .qitem .t { font-weight: 600; }
  .qitem .m { font-size: 12px; color: var(--mut); }

  /* 편집기 */
  main { flex: 1; overflow-y: auto; padding: 24px; }
  .editor-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .titlein { flex: 1; font-size: 22px; font-weight: 700; padding: 12px 14px;
             border-radius: 12px; border: 1px solid var(--bd); background: var(--surface); color: var(--fg); }
  .btn { padding: 11px 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .btn.save { background: #16a34a; color: #fff; }
  .btn.del  { background: var(--surface); color: var(--fg); border: 1px solid var(--bd); }
  .btn.export { background: var(--surface); color: var(--fg); border: 1px solid var(--bd); }
  .btn:disabled { opacity: .5; cursor: default; }

  .qcard { background: var(--surface); border: 1px solid var(--bd); border-radius: 14px; padding: 18px;
           margin-bottom: 16px; box-shadow: var(--shadow); }
  .qcard .qhead { display: flex; align-items: center; margin-bottom: 10px; }
  .qcard .qhead .no { font-weight: 700; color: var(--mut); }
  .qcard .qhead button { display: inline-flex; align-items: center; gap: 5px; margin-left: auto;
                         background: none; border: none; color: #dc2626; cursor: pointer; font-size: 14px; }
  .qtext { width: 100%; font-size: 17px; padding: 12px; border-radius: 10px; border: 1px solid var(--bd);
           background: var(--bg); color: var(--fg); resize: vertical; min-height: 52px; }

  .imgzone { margin-top: 12px; }
  .imgadd { background: var(--bg); color: var(--fg); border: 1px dashed #a1a1aa; border-radius: 10px;
            padding: 9px 14px; cursor: pointer; font-weight: 600; }
  .imgprev { display: flex; align-items: flex-start; gap: 12px; }
  .imgprev img { max-width: 260px; max-height: 160px; border-radius: 10px; background: var(--surface);
                 border: 1px solid var(--bd); object-fit: contain; }
  .imgrm { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); color: var(--fg);
           border: 1px solid var(--bd); border-radius: 8px; padding: 7px 12px; cursor: pointer;
           font-size: 13px; white-space: nowrap; }

  .choices { margin-top: 12px; display: grid; gap: 8px; }
  .crow { display: flex; align-items: center; gap: 10px; border-radius: 10px;
          padding: 8px 10px; }
  .crow .dot { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; }
  .c0 { background: #ef444418; } .c0 .dot { background: #ef4444; }
  .c1 { background: #3b82f618; } .c1 .dot { background: #3b82f6; }
  .c2 { background: #f59e0b18; } .c2 .dot { background: #f59e0b; }
  .c3 { background: #22c55e18; } .c3 .dot { background: #22c55e; }
  .c4 { background: #a855f718; } .c4 .dot { background: #a855f7; }
  .c5 { background: #06b6d418; } .c5 .dot { background: #06b6d4; }
  .ctext { flex: 1; font-size: 15px; padding: 9px; border-radius: 8px; border: 1px solid var(--bd);
           background: var(--surface); color: var(--fg); }
  .crow label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--fg);
                white-space: nowrap; cursor: pointer; }
  .crow .rm { display: inline-flex; align-items: center; background: none; border: none; color: #a1a1aa;
              cursor: pointer; padding: 4px; }
  .crow .rm:hover { color: #dc2626; }

  .qfoot { display: flex; gap: 18px; margin-top: 12px; align-items: center; font-size: 14px;
           color: var(--mut); }
  .qfoot input { width: 70px; padding: 7px; border-radius: 8px; border: 1px solid var(--bd);
                 background: var(--surface); color: var(--fg); text-align: center; }
  .addchoice, .addq { background: var(--bg); color: var(--fg); border: 1px solid var(--bd); border-radius: 10px;
                      padding: 9px 14px; cursor: pointer; font-weight: 600; }
  .addq { display: block; width: 100%; padding: 14px; margin-top: 4px; }

  .empty { color: var(--mut); text-align: center; margin-top: 80px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: var(--acc); color: #fff; padding: 12px 20px; border-radius: 10px;
           font-weight: 700; opacity: 0; transition: opacity .2s; pointer-events: none; box-shadow: var(--shadow);
           color: var(--on-acc); }
  .toast.show { opacity: 1; }
  .toast.err { background: #dc2626; color: #fff; }
</style>
</head>
<body>
<aside>
  <header>
    <a href="/host" class="logolink" title="처음 화면(교사 메인)으로"><img class="logo" src="/emblem.png" alt="teaveloper"></a>
    <span class="ttl">퀴즈 목록</span>
    <a href="/results">결과</a>
    <a href="/host">교사 →</a>
    <button class="themebtn" id="themeBtn" title="라이트/다크 전환"></button>
  </header>
  <button class="newbtn" id="newbtn">+ 새 퀴즈</button>
  <button class="importbtn" id="importbtn"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v10m0 0 4-4m-4 4-4-4"/><path d="M4 15v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4"/></svg>가져오기 (.json)</button>
  <input type="file" id="importFile" accept=".json,application/json" hidden>
  <div class="qlist" id="qlist"></div>
</aside>

<main id="main">
  <div class="empty" id="emptyState">왼쪽에서 퀴즈를 고르거나 <b>+ 새 퀴즈</b>를 누르세요.</div>
  <div id="editor" style="display:none"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = (s, el=document) => el.querySelector(s);
// teaveloper 스타일 인라인 아이콘(currentColor — 테마 자동 적용).
const ICONS = {
  moon: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
  sun: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  image: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
  export: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V5m0 0 4 4m-4-4-4 4"/><path d="M4 15v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4"/></svg>',
  x: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
};
const api = (url, opt) => fetch(url, opt).then(async r => {
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
  return data;
});
const COLORS = 6;
let current = null;       // 편집 중인 퀴즈 객체
let activeId = null;

function toast(msg, isErr) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 1800);
}

async function loadList() {
  const list = await api('/api/quizzes');
  const box = $('#qlist'); box.innerHTML = '';
  for (const q of list) {
    const d = document.createElement('div');
    d.className = 'qitem' + (q.id === activeId ? ' active' : '');
    d.innerHTML = `<div class="t"></div><div class="m">${q.questions}문항</div>`;
    $('.t', d).textContent = q.title || '(제목 없음)';
    d.onclick = () => openQuiz(q.id);
    box.appendChild(d);
  }
}

function blankQuestion() {
  return { id: '', text: '', image: '', timeSec: 20, points: 1000,
           choices: [ {text:'',correct:false}, {text:'',correct:false},
                      {text:'',correct:false}, {text:'',correct:false} ] };
}

function newQuiz() {
  current = { id: '', title: '', questions: [ blankQuestion() ] };
  activeId = null;
  render(); loadList();
}

async function openQuiz(id) {
  current = await api('/api/quizzes/' + id);
  activeId = id;
  render(); loadList();
}

/* 구조 변경 전에 화면의 입력값을 current 로 흡수 */
function syncFromDOM() {
  if (!current) return;
  current.title = $('.titlein').value;
  current.questions = [...document.querySelectorAll('.qcard')].map(card => ({
    id: card.dataset.qid || '',
    text: $('.qtext', card).value,
    image: card._image || '',
    timeSec: parseInt($('.qtime', card).value) || 20,
    points: parseInt($('.qpoints', card).value) || 1000,
    choices: [...card.querySelectorAll('.crow')].map(row => ({
      text: $('.ctext', row).value,
      correct: $('.ccorrect', row).checked,
    })),
  }));
}

function render() {
  $('#emptyState').style.display = 'none';
  const ed = $('#editor'); ed.style.display = 'block'; ed.innerHTML = '';

  const head = document.createElement('div');
  head.className = 'editor-head';
  head.innerHTML = `<input class="titlein" placeholder="퀴즈 제목 (예: 5학년 1학기 과학)">
                    <button class="btn export" id="exportBtn">${ICONS.export}내보내기</button>
                    <button class="btn save" id="saveBtn">저장</button>
                    <button class="btn del" id="delBtn">삭제</button>`;
  ed.appendChild(head);
  $('.titlein', head).value = current.title || '';
  $('#exportBtn', head).onclick = exportQuiz;
  $('#saveBtn', head).onclick = save;
  $('#delBtn', head).onclick = del;
  $('#delBtn', head).disabled = !current.id;

  current.questions.forEach((q, qi) => ed.appendChild(questionCard(q, qi)));

  const addq = document.createElement('button');
  addq.className = 'addq'; addq.textContent = '+ 문항 추가';
  addq.onclick = () => { syncFromDOM(); current.questions.push(blankQuestion()); render(); };
  ed.appendChild(addq);
}

function questionCard(q, qi) {
  const card = document.createElement('div');
  card.className = 'qcard'; card.dataset.qid = q.id || '';
  card.innerHTML = `
    <div class="qhead"><span class="no">문항 ${qi + 1}</span>
      <button title="문항 삭제">${ICONS.x} 삭제</button></div>
    <textarea class="qtext" placeholder="질문을 입력하세요"></textarea>
    <div class="imgzone"><input class="imgfile" type="file" accept="image/*" hidden></div>
    <div class="choices"></div>
    <button class="addchoice" style="margin-top:8px">+ 보기 추가</button>
    <div class="qfoot">
      <span>제한시간 <input class="qtime" type="number" min="5" max="120"> 초</span>
      <span>배점 <input class="qpoints" type="number" min="100" max="2000" step="100"></span>
    </div>`;
  $('.qtext', card).value = q.text || '';
  card._image = q.image || '';
  $('.imgfile', card).onchange = async (e) => {
    const f = e.target.files[0]; e.target.value = '';
    if (!f) return;
    try { card._image = await processImageFile(f); renderImgZone(card); }
    catch (err) { toast(err.message, true); }
  };
  renderImgZone(card);
  $('.qtime', card).value = q.timeSec || 20;
  $('.qpoints', card).value = q.points || 1000;
  $('.qhead button', card).onclick = () => {
    syncFromDOM();
    current.questions.splice(qi, 1);
    if (current.questions.length === 0) current.questions.push(blankQuestion());
    render();
  };
  const cbox = $('.choices', card);
  q.choices.forEach((c, ci) => cbox.appendChild(choiceRow(c, ci, qi)));
  $('.addchoice', card).onclick = () => {
    syncFromDOM();
    if (current.questions[qi].choices.length >= COLORS) return toast('보기는 최대 ' + COLORS + '개', true);
    current.questions[qi].choices.push({ text:'', correct:false });
    render();
  };
  return card;
}

function choiceRow(c, ci, qi) {
  const row = document.createElement('div');
  row.className = 'crow c' + (ci % COLORS);
  row.innerHTML = `<span class="dot"></span>
    <input class="ctext" placeholder="보기 ${ci + 1}">
    <label><input class="ccorrect" type="checkbox"> 정답</label>
    <button class="rm" title="보기 삭제">${ICONS.x}</button>`;
  $('.ctext', row).value = c.text || '';
  $('.ccorrect', row).checked = !!c.correct;
  $('.rm', row).onclick = () => {
    syncFromDOM();
    const ch = current.questions[qi].choices;
    if (ch.length <= 2) return toast('보기는 최소 2개', true);
    ch.splice(ci, 1);
    render();
  };
  return row;
}

/* 카드의 그림 영역을 card._image 상태에 맞춰 그린다(미리보기 ↔ 추가 버튼). */
function renderImgZone(card) {
  const zone = $('.imgzone', card);
  zone.querySelectorAll('.imgprev, .imgadd').forEach(n => n.remove());
  if (card._image) {
    const wrap = document.createElement('div');
    wrap.className = 'imgprev';
    wrap.innerHTML = `<img alt="문제 그림"><button class="imgrm" type="button">${ICONS.x} 그림 제거</button>`;
    $('img', wrap).src = card._image;
    $('.imgrm', wrap).onclick = () => { card._image = ''; renderImgZone(card); };
    zone.appendChild(wrap);
  } else {
    const add = document.createElement('button');
    add.type = 'button'; add.className = 'imgadd'; add.innerHTML = ICONS.image + '그림 추가';
    add.onclick = () => $('.imgfile', card).click();
    zone.appendChild(add);
  }
}

/* 업로드 그림을 긴 변 1000px·JPEG 로 축소해 data URI 로 만든다(용량·오프라인 공유). */
const IMG_MAX_DIM = 1000;
function processImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) return reject(new Error('이미지 파일만 넣을 수 있습니다.'));
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('이미지를 열 수 없습니다.'));
      img.onload = () => {
        let w = img.naturalWidth, h = img.naturalHeight;
        const scale = Math.min(1, IMG_MAX_DIM / Math.max(w, h));
        w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); // 투명 PNG/GIF → 흰 배경(JPEG는 투명 미지원)
        ctx.drawImage(img, 0, 0, w, h);
        let q = 0.82, out = canvas.toDataURL('image/jpeg', q);
        while (out.length > 900 * 1024 && q > 0.4) { q -= 0.15; out = canvas.toDataURL('image/jpeg', q); }
        resolve(out);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function save() {
  syncFromDOM();
  try {
    const saved = await api('/api/quizzes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(current),
    });
    current = saved; activeId = saved.id;
    await loadList(); render();
    toast('저장됨');
  } catch (e) { toast(e.message, true); }
}

/* 내보내기 — 현재 퀴즈를 .json 파일로 저장(그림 data URI 포함, 그대로 공유 가능). */
function exportQuiz() {
  if (!current) return;
  syncFromDOM();
  const blob = new Blob([JSON.stringify(current, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const base = (current.title || 'quiz').trim().replace(/[\\/:*?"<>|]+/g, '_').slice(0, 40) || 'quiz';
  a.download = base + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('내보냄: ' + a.download);
}

/* 가져오기 — .json 파일을 읽어 새 퀴즈로 추가. 항상 새 ID(id 비움) → 기존 퀴즈 절대 안 덮음. */
function importQuiz(file) {
  const reader = new FileReader();
  reader.onerror = () => toast('파일을 읽지 못했습니다.', true);
  reader.onload = async () => {
    let q;
    try { q = JSON.parse(reader.result); }
    catch (e) { return toast('JSON 파일을 읽지 못했습니다.', true); }
    if (!q || typeof q !== 'object' || !Array.isArray(q.questions)) {
      return toast('퀴즈 파일 형식이 아닙니다.', true);
    }
    q.id = '';                 // 새 ID 강제 — 저장 시 서버가 발급
    current = q; activeId = null;
    render();
    await save();              // 목록에 바로 추가 + 서버 검증(그림/보기 등)
  };
  reader.readAsText(file);
}

async function del() {
  if (!current.id || !confirm('이 퀴즈를 삭제할까요?')) return;
  try {
    await api('/api/quizzes/' + current.id, { method: 'DELETE' });
    current = null; activeId = null;
    $('#editor').style.display = 'none';
    $('#emptyState').style.display = 'block';
    await loadList();
    toast('삭제됨');
  } catch (e) { toast(e.message, true); }
}

$('#newbtn').onclick = newQuiz;
$('#importbtn').onclick = () => $('#importFile').click();
$('#importFile').onchange = (e) => { const f = e.target.files[0]; e.target.value = ''; if (f) importQuiz(f); };

(function initTheme(){
  const b = $('#themeBtn'); if(!b) return;
  const sync = () => b.innerHTML = document.documentElement.getAttribute('data-theme')==='dark' ? ICONS.sun : ICONS.moon;
  sync();
  b.onclick = () => {
    const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('cq_theme', next); } catch(e){}
    sync();
  };
})();

loadList();
</script>
</body>
</html>
