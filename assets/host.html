<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>교실 퀴즈 — 교사 화면</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='.5' stop-color='%238b5cf6'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><circle cx='32' cy='25' r='9' fill='white'/><path d='M32 31 L43 48 L21 48 Z' fill='white'/></svg>">
<script>(function(){try{var t=localStorage.getItem('cq_theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root { color-scheme: light;
    --bg:#fafafa; --surface:#ffffff; --bd:#e4e4e7; --mut:#71717a; --fg:#18181b;
    --acc:#2563eb; --acc-soft:#eff6ff; --on-acc:#ffffff; --hover:#f4f4f5;
    --brand: linear-gradient(135deg,#6366f1,#8b5cf6 50%,#06b6d4);
    --shadow: 0 1px 3px rgba(24,24,27,.08), 0 1px 2px rgba(24,24,27,.04); }
  :root[data-theme="dark"] { color-scheme: dark;
    --bg:#0f172a; --surface:#1e293b; --bd:#334155; --mut:#94a3b8; --fg:#e2e8f0;
    --acc:#38bdf8; --acc-soft:#0c2a40; --on-acc:#06283d; --hover:#334155;
    --shadow: 0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.3); }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, "Noto Sans KR", sans-serif;
         background: var(--bg); color: var(--fg); }
  /* Image_Editor 처럼 빈 공간에 teaveloper 엠블럼을 옅은 배경으로(흰 엠블럼 → mask 로 브랜드색 채움) */
  body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: var(--brand);
    -webkit-mask: url(/emblem.png) center / auto 56vh no-repeat;
            mask: url(/emblem.png) center / auto 56vh no-repeat;
    opacity: .06; }
  :root[data-theme="dark"] body::before { opacity: .10; }
  header { padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--bd);
           display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .brand:hover { opacity: .82; }
  .brand img { width: 34px; height: 34px; padding: 5px 9px; border-radius: 8px;
               background: var(--brand); object-fit: contain; }
  .brand b { font-size: 18px; font-weight: 800;
             background: var(--brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .themebtn { display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--bd);
              background: var(--surface); color: var(--fg); border-radius: 8px; padding: 7px; cursor: pointer; }
  .themebtn:hover { background: var(--hover); }
  .netbadge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
              padding: 4px 11px; border-radius: 999px; white-space: nowrap; border: 1px solid var(--bd); }
  .netbadge svg { width: 15px; height: 15px; flex-shrink: 0; }
  .netbadge.wifi { color: var(--acc); background: var(--acc-soft); border-color: transparent; }
  .netbadge.wired { color: var(--mut); background: var(--hover); }
  .netbadge.unknown { color: var(--mut); background: var(--hover); }
  header a { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--acc);
             text-decoration: none; font-weight: 600; }
  .ico { width: 15px; height: 15px; flex-shrink: 0; }
  header .spring { margin-left: auto; }
  .status { font-size: 13px; color: var(--mut); }
  #app { padding: 24px; }

  .btn { padding: 14px 28px; border: none; border-radius: 10px; font-weight: 800;
         font-size: 18px; cursor: pointer; background: var(--acc); color: var(--on-acc); box-shadow: var(--shadow); }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn.lg { font-size: 22px; padding: 18px 40px; border-radius: 12px; background: var(--brand); color: #fff; }

  /* 로비 */
  .lobby { display: flex; gap: 32px; flex-wrap: wrap; }
  .join { background: var(--surface); border: 1px solid var(--bd); border-radius: 16px; padding: 24px;
          text-align: center; box-shadow: var(--shadow); }
  .join img { width: 280px; height: 280px; background: #fff; border-radius: 12px; padding: 8px;
              border: 1px solid var(--bd); }
  .join .scan { font-size: 20px; font-weight: 800; margin: 12px 0 2px;
                background: var(--brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .join .url { font-size: 14px; color: var(--acc); word-break: break-all; }
  .join img { cursor: zoom-in; }
  .qrbig { margin-top: 14px; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .qrbig .ico { width: 19px; height: 19px; }

  /* QR 전체화면 (TV 표출용 — 멀리서·앞에 안 나와도 스캔). 가로 모니터의 좌우 여유에 참가자 명단 배치. */
  .qrfull { display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center;
            gap: 5vmin; flex-wrap: wrap; background: rgba(15,23,42,.93); cursor: zoom-out; padding: 3vmin; }
  .qrfull.show { display: flex; }
  .qrpanel { background: #fff; border-radius: 24px; padding: 4vmin;
             display: flex; flex-direction: column; align-items: center; gap: 2.4vh; max-width: 96vw; }
  .qrpanel img { width: min(78vh, 56vw); height: auto; image-rendering: pixelated; border-radius: 8px; }
  .qrpanel .qrurl { font-size: clamp(18px, 3.2vh, 40px); font-weight: 800; color: #0f172a;
                    word-break: break-all; font-family: ui-monospace, monospace; }
  .qrpanel .qrhint { font-size: 14px; color: #64748b; }
  .qrplayers { color: #fff; display: flex; flex-direction: column; min-width: 240px; max-width: 34vw;
               max-height: 88vh; }
  .qrplayers .cnt { font-size: clamp(22px, 3.6vh, 44px); font-weight: 800; margin-bottom: 2vh; }
  .qrplayers .cnt b { color: #38bdf8; }
  .qrplayers .names { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                      gap: 1.2vh; overflow-y: auto; padding-right: 4px; }
  .qrplayers .names .nm { background: rgba(255,255,255,.12); border-radius: 10px; padding: 10px 12px;
                          font-weight: 700; font-size: clamp(15px, 2.1vh, 24px); text-align: center;
                          animation: pop .25s ease; }
  .qrplayers .names .empty { color: #cbd5e1; font-size: clamp(15px, 2vh, 20px); grid-column: 1 / -1; }
  .lobby .right { flex: 1; min-width: 300px; }
  .pick { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  select { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid var(--bd);
           background: var(--surface); color: var(--fg); min-width: 220px; }
  .players { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; }
  .chip { background: var(--surface); border: 1px solid var(--bd); border-radius: 10px; padding: 12px;
          text-align: center; font-weight: 600; box-shadow: var(--shadow); animation: pop .25s ease; }
  @keyframes pop { from { transform: scale(.7); opacity: 0 } to { transform: scale(1); opacity: 1 } }

  /* 문제 */
  .qhead { display: flex; align-items: center; margin-bottom: 16px; gap: 20px; }
  .qhead .idx { font-size: 16px; color: var(--mut); }
  .timer { font-size: 56px; font-weight: 900; min-width: 90px; text-align: center;
           background: var(--surface); border: 1px solid var(--bd); border-radius: 16px; padding: 8px 0;
           box-shadow: var(--shadow); }
  .ans { margin-left: auto; font-size: 20px; font-weight: 700; }
  .qtext { font-size: 40px; font-weight: 800; text-align: center; margin: 24px 0 20px; line-height: 1.3; }
  .qimage { display: block; margin: 0 auto 28px; max-width: 560px; max-height: 38vh; width: auto; height: auto;
            border-radius: 14px; background: var(--surface); border: 1px solid var(--bd); object-fit: contain; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .opt { display: flex; align-items: center; gap: 16px; border-radius: 14px; padding: 22px 24px;
         font-size: 26px; font-weight: 700; color: #fff; box-shadow: var(--shadow); }
  .opt .shape { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  /* 보기 표시 = teaveloper 엠블럼 개수(순번). 1·2개는 나란히, 3개부터 방사형. 흰 엠블럼이라 색 타일 위에 보임. */
  .emblems { display: flex; align-items: center; justify-content: center; }
  .emblems .em { display: block; }
  .emblems.row { gap: 3px; }
  .emblems.row .em { width: auto; height: 32px; }
  .emblems.radial { position: relative; width: 40px; height: 40px; }
  .emblems.radial .em { position: absolute; left: 50%; top: 50%; width: auto; height: 17px;
    transform: translate(-50%,-50%) rotate(var(--a)) translateY(-12px) rotate(calc(-1 * var(--a))); }
  .opt.dim { opacity: .4; }
  .opt .mark { margin-left: auto; font-size: 28px; }
  .bar { height: 10px; background: #ffffff66; border-radius: 6px; margin-top: 10px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: #fff; }
  .cnt { font-size: 16px; margin-left: 8px; }

  /* 순위표 */
  .board { max-width: 720px; margin: 0 auto; }
  .row { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--bd);
         border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; font-size: 22px;
         box-shadow: var(--shadow); animation: pop .3s ease; }
  .row .r { width: 44px; font-weight: 800; color: var(--mut); }
  .row .nm { flex: 1; font-weight: 700; }
  .row .sc { font-weight: 800; color: var(--acc); }
  .row .dl { width: 56px; text-align: right; font-size: 15px; }
  .up { color: #16a34a } .down { color: #dc2626 } .same { color: #a1a1aa }

  /* 시상대 */
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 18px;
            margin: 30px 0 24px; }
  .pod { width: 150px; border-radius: 14px 14px 0 0; text-align: center; padding: 16px 8px;
         color: #fff; box-shadow: var(--shadow); }
  .pod .medal { font-size: 44px; } .pod .nm { font-weight: 800; font-size: 20px; margin: 6px 0; }
  .pod .sc { font-weight: 800; }
  .pod.p1 { height: 230px; background: linear-gradient(135deg,#f59e0b,#fbbf24); color: #422006; }
  .pod.p2 { height: 190px; background: linear-gradient(135deg,#94a3b8,#cbd5e1); color: #1e293b; }
  .pod.p3 { height: 160px; background: linear-gradient(135deg,#b45309,#d97706); color: #fff; }
  .center { text-align: center; margin-top: 24px; }
  .muted { color: var(--mut); }
</style>
</head>
<body>
<header>
  <span class="brand" id="home" title="처음 화면(로비)으로"><img src="/emblem.png" alt="teaveloper"><b>교실 퀴즈</b></span>
  <span id="net" class="netbadge"></span>
  <span class="spring"></span>
  <a href="/results"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14v3M12 9v8M17 12v5"/></svg>결과</a>
  <a href="/author"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>퀴즈 만들기</a>
  <span id="conn" class="status">연결 중…</span>
  <button class="themebtn" id="themeBtn" title="라이트/다크 전환"></button>
</header>
<div id="app"></div>
<div id="qrFull" class="qrfull" title="닫기">
  <div class="qrpanel">
    <img id="qrFullImg" alt="QR">
    <div class="qrurl" id="qrFullUrl"></div>
    <div class="qrhint">아무 곳이나 누르거나 ESC 로 닫기</div>
  </div>
  <div class="qrplayers">
    <div class="cnt">참가자 <b id="qrCount">0</b>명</div>
    <div class="names" id="qrNames"></div>
  </div>
</div>

<script>
const $ = (s, el=document) => el.querySelector(s);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };
function imageEl(src){ if(!src) return null; const i=el('img','qimage'); i.src=src; i.alt='문제 그림'; return i; }
const app = $('#app');
let ws, info = {}, lastState = null, countdown = null;

function send(o){ if(ws && ws.readyState===1) ws.send(JSON.stringify(o)); }

// teaveloper 스타일 인라인 아이콘(currentColor — 테마 자동 적용).
const ICONS = {
  moon: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
  sun: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  expand: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H4a1 1 0 0 0-1 1v4M16 3h4a1 1 0 0 1 1 1v4M16 21h4a1 1 0 0 0 1-1v-4M8 21H4a1 1 0 0 1-1-1v-4"/></svg>',
};

(function initTheme(){
  const b = $('#themeBtn'); if(!b) return;
  const sync = () => b.innerHTML = document.documentElement.getAttribute('data-theme')==='dark' ? ICONS.sun : ICONS.moon;
  sync();
  b.onclick = () => {
    const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('cq_theme', next); } catch(e){}
    sync();
  };
})();

// QR 전체화면 — TV 표출 시 크게. requestFullscreen 으로 브라우저 크롬까지 숨김(best-effort).
function openQrFull(){
  $('#qrFullImg').src = '/qr.png?size=1024';
  $('#qrFullUrl').textContent = info.joinURL || '';
  if(lastState && lastState.phase==='lobby') fillQrPlayers(lastState);
  $('#qrFull').classList.add('show');
  try { document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); } catch(e){}
}
// 전체화면 QR 옆 참가자 명단/숫자 — 학생이 충분히 들어왔는지 보고 닫을지 판단.
function fillQrPlayers(s){
  $('#qrCount').textContent = s.count || 0;
  const box = $('#qrNames'); box.innerHTML = '';
  const players = s.players || [];
  if(players.length === 0){ box.append(el('div','empty','QR을 찍으면 여기에 학생이 나타납니다.')); return; }
  for(const n of players){ const d = el('div','nm'); d.textContent = n; box.append(d); }
}
function closeQrFull(){
  $('#qrFull').classList.remove('show');
  try { if(document.fullscreenElement) document.exitFullscreen(); } catch(e){}
}
$('#qrFull').onclick = closeQrFull;
document.addEventListener('keydown', e => { if(e.key==='Escape') closeQrFull(); });

// 엠블럼 클릭 → 처음 화면(로비). 실수로 시작했을 때 빠져나오는 길.
// 진행 중일 때만 확인창(실제 게임이 잘못 눌려 날아가지 않게). 로비면 이미 처음이라 무시.
$('#home').onclick = () => {
  if (!lastState || lastState.phase === 'lobby') return;
  if (confirm('진행 중인 퀴즈를 끝내고 처음 화면(로비)으로 돌아갈까요?')) send({ type: 'end' });
};

(async () => {
  info = await fetch('/info').then(r=>r.json());
  showNetwork(info.media);
  connect();
})();

// 학생 접속 주소의 연결 방식을 사실 그대로 명시(경고 아님 — 유선이라도 학생망일 수 있음).
const NET_ICON = {
  wifi: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M4.5 11.5a11 11 0 0 1 15 0"/><path d="M8 15a6 6 0 0 1 8 0"/>
    <circle cx="12" cy="18.5" r="1.1" fill="currentColor" stroke="none"/></svg>`,
  wired: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <rect x="4" y="8.5" width="16" height="11.5" rx="1.5"/><path d="M8 8.5V5.5h8v3"/>
    <path d="M8.5 12.5v2.5M12 12.5v2.5M15.5 12.5v2.5"/></svg>`,
  unknown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="9"/><path d="M9.5 9.3a2.6 2.6 0 0 1 4.2 1.9c0 1.7-2.5 2-2.5 3.6"/>
    <circle cx="11.7" cy="17.6" r=".7" fill="currentColor" stroke="none"/></svg>`,
};
function showNetwork(media){
  const map = {
    wireless: { cls:'wifi',    icon:NET_ICON.wifi,    label:'무선 (Wi-Fi)' },
    wired:    { cls:'wired',   icon:NET_ICON.wired,   label:'유선 (랜선)' },
  };
  const n = map[media] || { cls:'unknown', icon:NET_ICON.unknown, label:'연결 방식 불명' };
  const nb = $('#net');
  nb.className = 'netbadge ' + n.cls;
  nb.innerHTML = n.icon + '<span>' + n.label + '</span>';
}

function connect(){
  ws = new WebSocket(`ws://${location.host}/ws?role=host`);
  ws.onopen = () => { $('#conn').textContent='● 연결됨'; $('#conn').style.color='#16a34a'; };
  ws.onclose = () => { $('#conn').textContent='○ 끊김 — 재시도'; $('#conn').style.color='#dc2626'; setTimeout(connect,1500); };
  ws.onmessage = (e) => { const s=JSON.parse(e.data); if(s.type==='state'){ lastState=s; render(s); } };
}

function render(s){
  clearInterval(countdown); countdown=null;
  // 전체화면 QR 가 열려 있고 로비면 명단/숫자를 실시간 갱신.
  if(s.phase==='lobby' && $('#qrFull').classList.contains('show')) fillQrPlayers(s);
  if(s.phase==='lobby') return renderLobby(s);
  if(s.phase==='question') return renderQuestion(s);
  if(s.phase==='reveal') return renderReveal(s);
  if(s.phase==='scoreboard') return renderBoard(s,false);
  if(s.phase==='podium') return renderPodium(s);
}

async function renderLobby(s){
  app.innerHTML='';
  const wrap = el('div','lobby');

  const join = el('div','join');
  join.innerHTML = `<img src="/qr.png" alt="QR">
    <div class="scan">QR을 찍어 입장</div>
    <div class="url">${info.joinURL}</div>
    <button class="btn qrbig" id="qrBig">${ICONS.expand}전체화면으로 크게</button>`;
  wrap.appendChild(join);
  $('img', join).onclick = openQrFull;
  $('#qrBig', join).onclick = openQrFull;

  const right = el('div','right');
  const pick = el('div','pick');
  const sel = el('select'); sel.id='quizSel';
  sel.innerHTML = '<option value="">퀴즈를 고르세요…</option>';
  const startBtn = el('button','btn lg','시작하기'); startBtn.disabled=true;
  pick.append(sel, startBtn);
  right.append(pick);

  const h = el('div','',`<h2>참가자 <span style="color:#2563eb">${s.count}</span>명</h2>`);
  right.append(h);
  const grid = el('div','players');
  if(s.count===0) grid.append(el('div','muted','QR을 찍으면 여기에 학생이 나타납니다.'));
  for(const n of (s.players||[])) { const c=el('div','chip'); c.textContent=n; grid.append(c); }
  right.append(grid);
  wrap.append(right);
  app.append(wrap);

  // 퀴즈 목록(로컬 전용 API).
  try {
    const list = await fetch('/api/quizzes').then(r=>r.json());
    for(const q of list){ const o=el('option'); o.value=q.id; o.textContent=`${q.title} (${q.questions}문항)`; sel.append(o); }
  } catch(e){}
  sel.onchange = () => startBtn.disabled = !sel.value;
  startBtn.onclick = () => sel.value && send({type:'start', quizId:sel.value});
}

// 보기 순번 n 만큼 엠블럼을 그린다(1·2개 나란히, 3개부터 방사형).
function emblemImg(){ const i=el('img','em'); i.src='/emblem.png'; i.alt=''; return i; }
function shapeEl(n){
  n = Math.max(1, n||1);
  const s = el('span','shape');
  const w = el('div','emblems ' + (n<=2 ? 'row' : 'radial'));
  for(let k=0;k<n;k++){
    const e = emblemImg();
    if(n>2) e.style.setProperty('--a', (360/n*k)+'deg');
    w.append(e);
  }
  s.append(w);
  return s;
}

function optEl(c, opts={}){
  const o = el('div','opt');
  o.style.background = c.color;
  const txt = el('span','txt'); txt.textContent = c.text;
  o.append(shapeEl(c.n), txt);
  if(opts.dim) o.classList.add('dim');
  if(opts.mark) o.append(el('span','mark', opts.mark));
  if(opts.bar!=null){
    const wrap=el('div'); wrap.style.flex='1';
    const tline=el('div'); tline.style.display='flex'; tline.style.alignItems='center';
    const t2 = el('span','txt'); t2.textContent = c.text; t2.style.marginLeft='12px';
    tline.append(shapeEl(c.n), t2);
    if(opts.mark) tline.append(el('span','mark',opts.mark));
    tline.append(el('span','cnt', opts.count+'명'));
    const bar=el('div','bar'); const i=el('i'); i.style.width=opts.bar+'%'; bar.append(i);
    wrap.append(tline, bar); o.innerHTML=''; o.append(wrap);
  }
  return o;
}

function renderQuestion(s){
  app.innerHTML='';
  const head = el('div','qhead');
  head.append(el('span','idx',`문제 ${s.index} / ${s.total}`));
  const timer = el('div','timer', String(s.timeSec));
  head.append(timer);
  const ans = el('div','ans'); ans.innerHTML = `<span style="color:#2563eb">${s.answers}</span> / ${s.players} 답변`;
  head.append(ans);
  app.append(head);

  app.append(el('div','qtext', escapeHtml(s.question)));
  const qimg = imageEl(s.image); if(qimg) app.append(qimg);
  const grid = el('div','grid');
  s.choices.forEach(c => grid.append(optEl(c)));
  app.append(grid);

  app.append(el('div','center',`<button class="btn" id="nx">정답 공개 →</button>`));
  $('#nx').onclick = () => send({type:'next'});

  // 카운트다운(서버가 시간초과 시 자동 공개; 화면은 표시용).
  let t = s.timeSec;
  countdown = setInterval(()=>{ t--; timer.textContent = Math.max(0,t); if(t<=0) clearInterval(countdown); }, 1000);
  // 답변 수 실시간 갱신은 새 state(broadcastHost) 가 들어오며 자동 반영됨.
}

function renderReveal(s){
  app.innerHTML='';
  const head = el('div','qhead');
  head.append(el('span','idx',`문제 ${s.index} / ${s.total}`));
  head.append(el('div','ans',`정답자 <span style="color:#16a34a">${s.correctCount}</span>명`));
  app.append(head);
  app.append(el('div','qtext', escapeHtml(s.question)));
  const rimg = imageEl(s.image); if(rimg) app.append(rimg);

  const total = s.distribution.reduce((a,b)=>a+b,0) || 1;
  const grid = el('div','grid');
  s.choices.forEach((c,i)=>{
    const cnt = s.distribution[i]||0;
    grid.append(optEl(c, { mark: c.correct?'✓':'✗', bar: Math.round(cnt/total*100), count: cnt, dim: !c.correct }));
  });
  app.append(grid);
  app.append(el('div','center',`<button class="btn" id="nx">순위표 →</button>`));
  $('#nx').onclick = () => send({type:'next'});
}

function deltaHtml(d){
  if(d>0) return `<span class="up">▲${d}</span>`;
  if(d<0) return `<span class="down">▼${-d}</span>`;
  return `<span class="same">–</span>`;
}

function renderBoard(s){
  app.innerHTML='';
  app.append(el('div','center',`<h2>순위표 — 문제 ${s.index}/${s.total}</h2>`));
  const board = el('div','board');
  for(const p of s.leaderboard){
    const row = el('div','row');
    row.innerHTML = `<span class="r">${p.rank}</span><span class="nm"></span>
      <span class="dl">${deltaHtml(p.delta)}</span><span class="sc">${p.score}</span>`;
    $('.nm',row).textContent = p.name;
    board.append(row);
  }
  app.append(board);
  const label = s.hasNext ? '다음 문제 →' : '최종 결과 →';
  app.append(el('div','center',`<button class="btn lg" id="nx">${label}</button>`));
  $('#nx').onclick = () => send({type:'next'});
}

function renderPodium(s){
  app.innerHTML='';
  app.append(el('div','center','<h1>🏆 최종 결과</h1>'));
  const top = s.leaderboard.slice(0,3);
  const medals=['🥇','🥈','🥉']; const order=[1,0,2]; // 2등,1등,3등 배치
  const pod = el('div','podium');
  order.forEach(i=>{ if(!top[i]) return;
    const d=el('div',`pod p${i+1}`);
    d.innerHTML=`<div class="medal">${medals[i]}</div><div class="nm"></div><div class="sc">${top[i].score}점</div>`;
    $('.nm',d).textContent=top[i].name; pod.append(d);
  });
  app.append(pod);

  if(s.leaderboard.length>3){
    const board=el('div','board');
    s.leaderboard.slice(3).forEach(p=>{
      const row=el('div','row');
      row.innerHTML=`<span class="r">${p.rank}</span><span class="nm"></span><span class="sc">${p.score}</span>`;
      $('.nm',row).textContent=p.name; board.append(row);
    });
    app.append(board);
  }
  app.append(el('div','center',`<button class="btn" id="nx">처음으로 ↩</button>`));
  $('#nx').onclick = () => send({type:'end'});
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
