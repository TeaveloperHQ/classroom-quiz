<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>교실 퀴즈</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='.5' stop-color='%238b5cf6'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><circle cx='32' cy='25' r='9' fill='white'/><path d='M32 31 L43 48 L21 48 Z' fill='white'/></svg>">
<script>(function(){try{var t=localStorage.getItem('cq_theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root { color-scheme: light;
    --bg:#fafafa; --surface:#ffffff; --bd:#e4e4e7; --mut:#71717a; --fg:#18181b;
    --acc:#2563eb; --hover:#f4f4f5; --brand: linear-gradient(135deg,#6366f1,#8b5cf6 50%,#06b6d4); }
  :root[data-theme="dark"] { color-scheme: dark;
    --bg:#0f172a; --surface:#1e293b; --bd:#334155; --mut:#94a3b8; --fg:#e2e8f0;
    --acc:#38bdf8; --hover:#334155; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { height:100%; }
  body { margin: 0; font-family: system-ui, "Noto Sans KR", sans-serif;
         background: var(--bg); color: var(--fg); display: flex; flex-direction: column; }
  /* Image_Editor 처럼 빈 공간에 teaveloper 엠블럼 배경 워터마크 */
  body::before { content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: var(--brand);
    -webkit-mask: url(/emblem.png) center / auto 48vh no-repeat;
            mask: url(/emblem.png) center / auto 48vh no-repeat;
    opacity: .06; }
  :root[data-theme="dark"] body::before { opacity: .10; }
  .bar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--bd);
         display: flex; align-items: center; font-size: 14px; }
  .bar .me { font-weight: 700; }
  .bar .sc { margin-left: auto; font-weight: 800; color: var(--acc); }
  .themebtn { display: inline-flex; align-items: center; justify-content: center; margin-left: 12px;
              border: 1px solid var(--bd); background: var(--surface); color: var(--fg);
              border-radius: 8px; padding: 6px; cursor: pointer; }
  .ico { width: 15px; height: 15px; flex-shrink: 0; }
  .joinlogo img { width: 56px; height: 56px; padding: 8px 16px; border-radius: 14px;
                  background: var(--brand); object-fit: contain; }
  #screen { flex: 1; display: flex; flex-direction: column; }

  /* 공통 중앙 카드 */
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding: 24px; gap: 12px; }
  .big { font-size: 30px; font-weight: 800; }
  .muted { color: var(--mut); }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#16a34a;
         margin-right:6px; animation:blink 1.2s infinite; }
  @keyframes blink { 50%{opacity:.3} }

  /* 입장 폼 */
  input { width: 100%; max-width: 340px; font-size: 22px; padding: 14px; border-radius: 12px;
          border: 1px solid var(--bd); text-align: center; background: var(--surface); color: var(--fg); }
  button.go { width:100%; max-width:340px; font-size:20px; font-weight:800; padding:14px;
              border:none; border-radius:12px; background:var(--brand); color:#fff; }
  .err { color:#dc2626; min-height:18px; font-size:14px; }

  /* 답 버튼 */
  .qbar { padding: 14px 16px; text-align:center; }
  .qbar .idx { color:var(--mut); font-size:14px; }
  .qbar .timer { font-size: 30px; font-weight:900; }
  .opts { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px; }
  .opt { border:none; border-radius:16px; color:#fff; font-weight:800; font-size:20px;
         display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
         cursor:pointer; padding:10px; min-height: 90px; transition: transform .05s;
         box-shadow: 0 1px 3px rgba(24,24,27,.12); }
  .opt:active { transform: scale(.97); }
  .opt .shape { font-size: 40px; }
  .opt .txt { font-size: 16px; opacity:.95; }
  .opts.locked .opt { opacity:.45; }
  .opts.locked .opt.picked { opacity:1; outline:4px solid var(--acc); }

  /* 결과 */
  .result { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; gap:10px; padding:24px; color:#fff; }
  .result.correct { background:#16a34a; } .result.wrong { background:#dc2626; }
  .result .muted { color:#ffffffcc; }
  .result .emoji { font-size:64px; } .result .gain { font-size:32px; font-weight:900; }
  .result .streak { font-size:18px; }
  .rankbig { font-size: 64px; font-weight: 900; color:var(--acc); }
</style>
</head>
<body>
<div class="bar" id="topbar" style="display:none">
  <span class="me" id="meName"></span>
  <span class="sc" id="meScore"></span>
  <button class="themebtn" id="themeBtn" title="라이트/다크 전환"></button>
</div>
<div id="screen"></div>

<script>
const $ = (s)=>document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const screen = $('#screen');
let ws, name='', token='', joined=false, countdown=null;

const ICONS = {
  moon: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>',
  sun: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
};

(function initTheme(){
  const b = $('#themeBtn'); if(!b) return;
  const sync = () => b.innerHTML = document.documentElement.getAttribute('data-theme')==='dark' ? ICONS.sun : ICONS.moon;
  sync();
  b.onclick = () => {
    const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('cq_theme', next); } catch(e){}
    sync();
  };
})();

// 재접속용 토큰(세션 유지).
token = sessionStorage.getItem('cq_token');
if(!token){ token = randId(); sessionStorage.setItem('cq_token', token); }
const savedName = sessionStorage.getItem('cq_name') || '';

renderJoin(savedName);

function randId(){ const a=new Uint8Array(8); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,'0')).join(''); }
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderJoin(pre){
  $('#topbar').style.display='none';
  screen.innerHTML='';
  const c = el('div','center');
  c.append(el('div','joinlogo','<img src="/emblem.png" alt="teaveloper">'));
  c.append(el('div','big','닉네임 입력'));
  const inp = el('input'); inp.maxLength=12; inp.placeholder='예: 홍길동'; inp.value=pre||''; inp.autofocus=true;
  const btn = el('button','go','입장하기');
  const err = el('div','err');
  c.append(inp, btn, err);
  screen.append(c);
  const go = ()=>{
    const v = inp.value.trim();
    if(!v){ err.textContent='닉네임을 입력하세요.'; return; }
    name = v; sessionStorage.setItem('cq_name', v); err.textContent='';
    connect();
  };
  btn.onclick = go;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
}

function connect(){
  const u = `ws://${location.host}/ws?role=student&name=${encodeURIComponent(name)}&token=${token}`;
  ws = new WebSocket(u);
  ws.onopen = ()=>{ joined=true; };
  ws.onmessage = (e)=>{ const s=JSON.parse(e.data); if(s.type==='state') render(s); };
  ws.onclose = ()=>{ if(joined) setTimeout(connect,1200); };
  ws.onerror = ()=>{};
}

function render(s){
  clearInterval(countdown); countdown=null;
  $('#topbar').style.display='flex';
  $('#meName').textContent = (s.you&&s.you.name)||name;
  $('#meScore').textContent = ((s.you&&s.you.score)||0)+'점';
  if(s.phase==='lobby')      return renderWait('곧 시작합니다','선생님을 기다리는 중…');
  if(s.phase==='question')   return renderQuestion(s);
  if(s.phase==='reveal')     return renderReveal(s);
  if(s.phase==='scoreboard') return renderRank(s,false);
  if(s.phase==='podium')     return renderRank(s,true);
}

function renderWait(title, sub){
  screen.innerHTML='';
  const c=el('div','center');
  c.append(el('div','big',title));
  c.append(el('div','muted',`<span class="dot"></span>${sub}`));
  screen.append(c);
}

function renderQuestion(s){
  screen.innerHTML='';
  const top=el('div','qbar');
  top.append(el('div','idx',`문제 ${s.index} / ${s.total}`));
  const tm=el('div','timer',String(s.timeSec)); top.append(tm);
  screen.append(top);

  if(s.answered){
    const c=el('div','center');
    c.append(el('div','big','답 제출 완료 ✓'));
    c.append(el('div','muted','<span class="dot"></span>다른 친구들을 기다리는 중…'));
    screen.append(c);
  } else {
    const grid=el('div','opts');
    s.choices.forEach((c,i)=>{
      const b=el('button','opt');
      b.style.background=c.color;
      b.innerHTML=`<span class="shape">${c.shape}</span><span class="txt">${escapeHtml(c.text)}</span>`;
      b.onclick=()=>{ send({type:'answer', choice:i});
        // 즉시 잠금 피드백(서버 확정 state 가 곧 옴)
        grid.classList.add('locked'); b.classList.add('picked');
        [...grid.children].forEach(x=>x.disabled=true);
      };
      grid.append(b);
    });
    screen.append(grid);
  }
  let t=s.timeSec;
  countdown=setInterval(()=>{ t--; tm.textContent=Math.max(0,t); if(t<=0) clearInterval(countdown); },1000);
}

function renderReveal(s){
  screen.innerHTML='';
  const ok=s.correct;
  const c=el('div', 'result '+(ok?'correct':'wrong'));
  if(!s.answered){
    c.classList.remove('correct');
    c.append(el('div','emoji','⏱'));
    c.append(el('div','big','시간 초과'));
  } else {
    c.append(el('div','emoji', ok?'🎉':'❌'));
    c.append(el('div','big', ok?'정답!':'오답'));
  }
  if(ok){
    c.append(el('div','gain','+'+s.gain+'점'));
    if(s.streak>=2) c.append(el('div','streak','🔥 '+s.streak+'연속 정답!'));
  }
  c.append(el('div','muted','현재 '+(s.you.rank||'-')+'등 · '+s.you.score+'점'));
  screen.append(c);
}

function renderRank(s, podium){
  screen.innerHTML='';
  const c=el('div','center');
  const rank=s.you.rank||'-';
  if(podium){
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'🎖';
    c.append(el('div','emoji', medal));
    c.append(el('div','rankbig', rank+'등'));
    c.append(el('div','big', s.you.score+'점'));
    c.append(el('div','muted', `총 ${s.totalPlayers}명 중`));
  } else {
    c.append(el('div','rankbig', rank+'등'));
    c.append(el('div','big', s.you.score+'점'));
    let d='';
    if(s.delta>0) d=`<span style="color:#16a34a">▲ ${s.delta}계단 상승</span>`;
    else if(s.delta<0) d=`<span style="color:#dc2626">▼ ${-s.delta}계단 하락</span>`;
    if(d) c.append(el('div','',d));
    c.append(el('div','muted','다음 문제를 기다리는 중…'));
  }
  screen.append(c);
}
</script>
</body>
</html>
